name: Deploy Realtime Stack

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-realtime-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify Code
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Run automated tests
        run: npm run test:all

  deploy-coordinator:
    name: Deploy Cloudflare Coordinator
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # 这里只发布 worker 代码。
      # worker 的运行时 secrets 仍然依赖 Cloudflare 侧已经持久化的生产配置。
      - name: Deploy worker with Wrangler
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --config realtime-worker/wrangler.jsonc

  smoke-production:
    name: Smoke Test Production Flow
    needs: deploy-coordinator
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      SMOKE_BASE_URL: ${{ vars.PRODUCTION_BASE_URL }}
      SMOKE_ARTIFACT_DIR: output/smoke
      SMOKE_MAX_ATTEMPTS: "16"
      SMOKE_RETRY_DELAY_MS: "30000"
      SMOKE_PAGE_TIMEOUT_MS: "20000"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Vercel 仍然走已有的 Git integration 自动部署。
      # 这一步只安装浏览器，真正的脚本会循环重试直到生产域名切到新版本或超时。
      - name: Install Chromium for smoke test
        run: npx playwright install --with-deps chromium

      - name: Run production smoke flow
        run: npm run smoke:prod

      - name: Upload smoke artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: production-smoke-artifacts
          path: output/smoke
          if-no-files-found: ignore
